name: Bike Shop CI Pipeline

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

env:
  IMAGE_NAME: karthikrajan/bike-shop

jobs:
  checkout:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract Tag
        id: vars
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "TAG=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "TAG=latest" >> $GITHUB_OUTPUT
          fi

      - name: Build Docker Image
        run: |
          docker build -t $IMAGE_NAME:${{ steps.vars.outputs.TAG }} .

      - name: Push Docker Image
        run: |
          docker push $IMAGE_NAME:${{ steps.vars.outputs.TAG }}

      - name: Trigger Harness Pipeline
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          curl -X POST "${{ secrets.HARNESS_WEBHOOK_URL }}" \
          -H "Content-Type: application/json" \
          -d "{\"tag\":\"${{ steps.vars.outputs.TAG }}\"}"

  # ------------------------------------------------
  # 🔹 Additional Dummy Enterprise Jobs
  # ------------------------------------------------

  build:
    runs-on: ubuntu-latest
    needs: checkout
    steps:
      - name: Dummy Build Stage
        run: echo "Running application build stage..."

  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Dummy Test Stage
        run: echo "Executing unit and integration tests..."

  sonar-scan:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Dummy SonarQube Scan
        run: echo "Performing SonarQube code quality scan..."

  generate-image:
    runs-on: ubuntu-latest
    needs: sonar-scan
    steps:
      - name: Dummy Image Generation
        run: echo "Generating Docker image artifact..."

  push-docker:
    runs-on: ubuntu-latest
    needs: generate-image
    steps:
      - name: Dummy Docker Push
        run: echo "Pushing image to Docker registry..."

  deploy:
    runs-on: ubuntu-latest
    needs: push-docker
    steps:
      - name: Dummy Deployment Stage
        run: echo "Deploying application to target environment..."