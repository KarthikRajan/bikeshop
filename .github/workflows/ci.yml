name: Bike Shop CI/CD Pipeline

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

env:
  IMAGE_NAME: karthikrajan/bike-shop

jobs:

  # ---------------------------------
  # 1️⃣ Checkout & Build
  # ---------------------------------
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Dummy Build Step
        run: |
          echo "Building application..."
          sleep 5
          echo "Build completed"

  # ---------------------------------
  # 2️⃣ Test Stage
  # ---------------------------------
  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Dummy Test Step
        run: |
          echo "Running unit tests..."
          sleep 5
          echo "All tests passed"

  # ---------------------------------
  # 3️⃣ Sonar Code Quality (Dummy)
  # ---------------------------------
  sonar:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Dummy Sonar Scan
        run: |
          echo "Running SonarQube analysis..."
          sleep 5
          echo "Code Quality Check Passed"

  # ---------------------------------
  # 4️⃣ Package Stage
  # ---------------------------------
  package:
    runs-on: ubuntu-latest
    needs: sonar
    steps:
      - name: Dummy Packaging
        run: |
          echo "Packaging application..."
          sleep 5
          echo "Package created"

  # ---------------------------------
  # 5️⃣ Docker Build & Push
  # ---------------------------------
  docker-build:
    runs-on: ubuntu-latest
    needs: package
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image
        run: |
          docker build -t $IMAGE_NAME:latest .
          docker push $IMAGE_NAME:latest

  # ---------------------------------
  # 6️⃣ Dummy Push Stage (Post Deployment)
  # ---------------------------------
  push:
    runs-on: ubuntu-latest
    needs: docker-build
    steps:
      - name: Dummy Push Job
        run: |
          echo "Triggering downstream deployment..."
          sleep 5
          echo "Deployment trigger completed"