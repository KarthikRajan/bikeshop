name: Bike Shop Enterprise CI/CD

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

env:
  IMAGE_NAME: karthikrajan/bike-shop

jobs:

# -------------------------------------------------
# 1️⃣ Checkout Stage
# -------------------------------------------------
  checkout:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.set_tag.outputs.tag }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Extract Tag
        id: set_tag
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "tag=latest" >> $GITHUB_OUTPUT
          fi


# -------------------------------------------------
# 2️⃣ Build Stage
# -------------------------------------------------
  build:
    runs-on: ubuntu-latest
    needs: checkout

    steps:
      - uses: actions/checkout@v4
      - name: Build Application
        run: |
          echo "🔨 Building Application..."
          sleep 5


# -------------------------------------------------
# 3️⃣ Test Stage
# -------------------------------------------------
  test:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4
      - name: Run Unit Tests
        run: |
          echo "🧪 Running Tests..."
          sleep 5


# -------------------------------------------------
# 4️⃣ Sonar Scan Stage (Dummy)
# -------------------------------------------------
  sonar-scan:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4
      - name: SonarQube Scan
        run: |
          echo "🔍 Running SonarQube Scan..."
          sleep 5


# -------------------------------------------------
# 5️⃣ Generate Docker Image Stage
# -------------------------------------------------
  generate-image:
    runs-on: ubuntu-latest
    needs: sonar-scan

    steps:
      - uses: actions/checkout@v4
      - name: Build Docker Image
        run: |
          docker build -t $IMAGE_NAME:${{ needs.checkout.outputs.tag }} .


# -------------------------------------------------
# 6️⃣ Push to Docker Hub Stage
# -------------------------------------------------
  push-image:
    runs-on: ubuntu-latest
    needs: generate-image

    steps:
      - uses: actions/checkout@v4
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push Docker Image
        run: |
          docker build -t $IMAGE_NAME:${{ needs.checkout.outputs.tag }} .
          docker push $IMAGE_NAME:${{ needs.checkout.outputs.tag }}


# -------------------------------------------------
# 7️⃣ Deploy Stage (Trigger Harness)
# -------------------------------------------------
  deploy:
    runs-on: ubuntu-latest
    needs: push-image
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Trigger Harness Deployment
        run: |
          echo "🚀 Triggering Harness Deployment..."
          curl -X POST "${{ secrets.HARNESS_WEBHOOK_URL }}" \
          -H "Content-Type: application/json" \
          -d "{\"tag\":\"${{ needs.checkout.outputs.tag }}\"}"