name: Bike Shop CI Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout the repository
      - name: Checkout Code
        uses: actions/checkout@v3

      # Step 2: Set Docker image tag (commit SHA)
      - name: Set Image Tag
        id: vars
        run: |
          # Short Git SHA for versioned tagging
          IMAGE_TAG=$(git rev-parse --short HEAD)
          echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV
          IMAGE_NAME=${{ secrets.DOCKER_USERNAME }}/bike-shop:$IMAGE_TAG
          echo "IMAGE_NAME=$IMAGE_NAME" >> $GITHUB_ENV

      # Step 3: Login to Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Step 4: Build Docker image with tag
      - name: Build Docker Image
        run: |
          docker build --build-arg APP_VERSION=$IMAGE_TAG -t $IMAGE_NAME .

      # Step 5: Push Docker image
      - name: Push Docker Image
        run: docker push $IMAGE_NAME

      # Optional: Tag image as latest and push
      - name: Tag as latest
        run: |
          docker tag $IMAGE_NAME ${{ secrets.DOCKER_USERNAME }}/bike-shop:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/bike-shop:latest
