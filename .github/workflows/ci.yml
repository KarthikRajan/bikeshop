name: Bike Shop CI Pipeline

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: karthikrajan/bike-shop

jobs:
  checkout:
    runs-on: ubuntu-latest

    outputs:
      image_tag: ${{ steps.version.outputs.TAG }}

    steps:
      # 1️⃣ Checkout
      - name: Checkout Source
        uses: actions/checkout@v4

      # 2️⃣ Install jq (required for version parsing)
      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      # 3️⃣ Setup Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 4️⃣ Login to Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 5️⃣ Auto Increment Version
      - name: Get Latest Docker Tag and Increment
        id: version
        run: |
          echo "Fetching latest version from Docker Hub..."

          LATEST=$(curl -s https://hub.docker.com/v2/repositories/${IMAGE_NAME}/tags?page_size=100 \
          | jq -r '.results[].name' \
          | grep -E '^v[0-9]+\.[0-9]+$' \
          | sort -V \
          | tail -n 1)

          echo "Latest tag: $LATEST"

          if [ -z "$LATEST" ]; then
            NEW_VERSION="v1.0"
          else
            MAJOR=$(echo $LATEST | cut -d'.' -f1 | tr -d 'v')
            MINOR=$(echo $LATEST | cut -d'.' -f2)
            NEW_MINOR=$((MINOR + 1))
            NEW_VERSION="v${MAJOR}.${NEW_MINOR}"
          fi

          echo "New version: $NEW_VERSION"
          echo "TAG=$NEW_VERSION" >> $GITHUB_OUTPUT

      # 6️⃣ Build Docker Image
      - name: Build Docker Image
        run: |
          docker build -t $IMAGE_NAME:${{ steps.version.outputs.TAG }} .

      # 7️⃣ Push Docker Image
      - name: Push Docker Image
        run: |
          docker push $IMAGE_NAME:${{ steps.version.outputs.TAG }}

      # 8️⃣ Trigger Harness CD Pipeline
      - name: Trigger Harness Pipeline
        run: |
          curl -X POST "${{ secrets.HARNESS_WEBHOOK_URL }}" \
          -H "Content-Type: application/json" \
          -d "{\"tag\":\"${{ steps.version.outputs.TAG }}\"}"

  # ------------------------------------------------
  # 🔹 Additional Dummy Enterprise Jobs
  # ------------------------------------------------

  build:
    runs-on: ubuntu-latest
    needs: checkout
    steps:
      - run: echo "Running application build stage..."

  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - run: echo "Executing unit and integration tests..."

  sonar-scan:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - run: echo "Performing SonarQube code quality scan..."

  generate-image:
    runs-on: ubuntu-latest
    needs: sonar-scan
    steps:
      - run: echo "Generating Docker image artifact..."

  push-docker:
    runs-on: ubuntu-latest
    needs: generate-image
    steps:
      - run: echo "Pushing image to Docker registry..."

  deploy:
    runs-on: ubuntu-latest
    needs: push-docker
    steps:
      - run: echo "Deploying application to target environment..."