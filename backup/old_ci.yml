name: Bike Shop CI Pipeline

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

env:
  IMAGE_NAME: karthikrajan/bike-shop

jobs:
  build-test-push:
    runs-on: ubuntu-latest

    steps:
      # -----------------------------
      # 1️⃣ Checkout Code
      # -----------------------------
      - name: Checkout Source
        uses: actions/checkout@v4

      # -----------------------------
      # 2️⃣ Setup Docker Buildx
      # -----------------------------
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # -----------------------------
      # 3️⃣ Login to Docker Hub
      # -----------------------------
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # -----------------------------
      # 4️⃣ Set Image Tag
      # -----------------------------
      - name: Extract Tag
        id: vars
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "TAG=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "TAG=latest" >> $GITHUB_OUTPUT
          fi

      # -----------------------------
      # 5️⃣ Build Docker Image
      # -----------------------------
      - name: Build Docker Image
        run: |
          docker build -t $IMAGE_NAME:${{ steps.vars.outputs.TAG }} .

      # -----------------------------
      # 6️⃣ Push Docker Image
      # -----------------------------
      - name: Push Docker Image
        run: |
          docker push $IMAGE_NAME:${{ steps.vars.outputs.TAG }}

      # -----------------------------
      # 7️⃣ Trigger Harness CD Pipeline
      # -----------------------------
      - name: Trigger Harness Pipeline
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          curl -X POST "${{ secrets.HARNESS_WEBHOOK_URL }}" \
          -H "Content-Type: application/json" \
          -d "{\"tag\":\"${{ steps.vars.outputs.TAG }}\"}"